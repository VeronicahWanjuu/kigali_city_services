name: kigali_directory
description: Kigali City Services & Places Directory
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  # firebase_storage REMOVED — Spark plan does not support Storage

  # ── State Management ──────────────────────────────────────────
  provider: ^6.1.2

  # ── Maps (flutter_map + OpenStreetMap = free, no API key) ────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Location / GPS ────────────────────────────────────────────
  geolocator: ^13.0.1

  # ── URL launcher for directions + phone calls ─────────────────
  url_launcher: ^6.3.1

  # ── Image handling ────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # ── UI components ─────────────────────────────────────────────
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.1

  # ── Utilities ─────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_native_splash:
  color: '#0D1B2A'
  color_dark: '#0D1B2A'

flutter:
  uses-material-design: true
  assets:
    - assets/images/
